name: Docker - build & push

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
    tags: [ v* ]

jobs:
  verify-spec-values:
    uses: ./.github/workflows/verify-spec-values.yml

  build-and-push:
    # Ensure spec values are up-to-date before building an image
    needs: verify-spec-values

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # The permissions below are needed
      # only for generating attestations
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Docker metadata
      id: docker_metadata
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # reflects the last commit on the `master` branch
          type=ref,event=branch
          # tags release images as vX.Y.Z
          # tags _only_ stable releases as `latest`
          type=semver,pattern={{version}},prefix=v

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: build_and_push
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        build-args: |
          GIT_TAG=${{ github.ref_name }}
          GIT_COMMIT=${{ github.sha }}
        platforms: linux/amd64,linux/arm64
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: ${{ steps.docker_metadata.outputs.tags }}
        labels: ${{ steps.docker_metadata.outputs.labels }}

    - name: Generate build provenance attestation
      uses: actions/attest-build-provenance@e4d4f7c39adfa4c260fb5c147f0622000aa14b99 # v4.1.0
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.build_and_push.outputs.digest }}
        push-to-registry: true

    - name: Generate SBOM
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        output-file: 'sbom.json'
        upload-release-assets: false

    - name: Generate SBOM attestation
      uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.build_and_push.outputs.digest }}
        sbom-path: 'sbom.json'
        push-to-registry: true
